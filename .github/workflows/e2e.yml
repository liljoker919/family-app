name: Playwright E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: run-e2e
        run: npm run test:e2e
        continue-on-error: true
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit XML and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 30

      - name: Upload results to BrowserStack Test Management
        if: always()
        run: |
          if [ ! -f "test-results/playwright-junit.xml" ]; then
            echo "JUnit XML not found — skipping BrowserStack upload."
            exit 0
          fi
          if [ -z "$BROWSERSTACK_PROJECT_ID" ]; then
            echo "BROWSERSTACK_PROJECT_ID is not set. Add it as a GitHub repository variable (e.g. PR-123)."
            exit 1
          fi

          upload_to_endpoint() {
            local endpoint="$1"
            local response_file="/tmp/browserstack-upload-response.json"
            local http_code

            echo "Trying BrowserStack endpoint: $endpoint"

            http_code=$(curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST "$endpoint" \
              -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@test-results/playwright-junit.xml" \
              -F "format=junit")

            echo "BrowserStack HTTP status: $http_code"
            echo "BrowserStack response body:"
            cat "$response_file"

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              return 0
            fi

            return 1
          }

          if upload_to_endpoint "https://test-management.browserstack.com/api/v2/projects/${BROWSERSTACK_PROJECT_ID}/test-runs/import"; then
            echo "BrowserStack upload succeeded via v2 endpoint."
            exit 0
          fi

          if upload_to_endpoint "https://test-management.browserstack.com/api/v1/projects/${BROWSERSTACK_PROJECT_ID}/test-runs/import"; then
            echo "BrowserStack upload succeeded via v1 endpoint."
            exit 0
          fi

          echo "BrowserStack upload failed on both v2 and v1 endpoints."
          echo "Verify BROWSERSTACK_PROJECT_ID (PR-xxx) and API credentials from account settings."
          exit 1
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_PROJECT_ID: ${{ vars.BROWSERSTACK_PROJECT_ID }}

      - name: Test summary
        if: always()
        run: |
          echo "## Playwright E2E Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-e2e.outcome }}" = "success" ]; then
            echo "✅ All Playwright E2E tests passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some Playwright E2E tests failed. Download the **playwright-report** artifact for the HTML report and **playwright-test-results** for screenshots/videos/traces." >> $GITHUB_STEP_SUMMARY
          fi
