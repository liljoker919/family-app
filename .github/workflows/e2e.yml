name: Playwright E2E Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: run-e2e
        run: npm run test:e2e
        continue-on-error: true
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          E2E_DAD_EMAIL: ${{ secrets.E2E_DAD_EMAIL }}
          E2E_MOM_EMAIL: ${{ secrets.E2E_MOM_EMAIL }}
          E2E_CHILD1_EMAIL: ${{ secrets.E2E_CHILD1_EMAIL }}
          E2E_CHILD2_EMAIL: ${{ secrets.E2E_CHILD2_EMAIL }}
          E2E_VALID_PASSWORD: ${{ secrets.E2E_VALID_PASSWORD }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JUnit XML and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 30

      - name: Upload results to BrowserStack Test Management
        if: always()
        run: |
          if [ ! -f "test-results/playwright-junit.xml" ]; then
            echo "JUnit XML not found — skipping BrowserStack upload."
            exit 0
          fi
          python - <<'PY'
          import base64
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.request
          import xml.etree.ElementTree as ET

          junit_path = "test-results/playwright-junit.xml"
          username = os.getenv("BROWSERSTACK_USERNAME", "").strip()
          access_key = os.getenv("BROWSERSTACK_ACCESS_KEY", "").strip()
          project_id = os.getenv("BROWSERSTACK_PROJECT_ID", "").strip()

          if not project_id:
            print("BROWSERSTACK_PROJECT_ID is not set. Skipping BrowserStack upload.")
            sys.exit(0)

          if not username or not access_key:
            print("BrowserStack credentials are missing. Skipping BrowserStack upload.")
            sys.exit(0)

          auth = base64.b64encode(f"{username}:{access_key}".encode("utf-8")).decode("ascii")
          headers = {
            "Authorization": f"Basic {auth}",
            "Content-Type": "application/json",
          }

          def api_request(method: str, url: str, payload=None):
            data = None if payload is None else json.dumps(payload).encode("utf-8")
            req = urllib.request.Request(url, data=data, method=method)
            for key, value in headers.items():
              req.add_header(key, value)
            try:
              with urllib.request.urlopen(req, timeout=30) as response:
                raw = response.read().decode("utf-8")
                return response.status, raw
            except urllib.error.HTTPError as exc:
              raw = exc.read().decode("utf-8", errors="replace")
              return exc.code, raw

          run_name = (
            f"GitHub run #{os.getenv('GITHUB_RUN_NUMBER', 'unknown')}"
            f" ({os.getenv('GITHUB_SHA', '')[:7]})"
          )
          create_url = f"https://test-management.browserstack.com/api/v2/projects/{project_id}/test-runs"
          create_payload = {
            "test_run": {
              "name": run_name,
              "description": "Automated Playwright run from GitHub Actions",
              "run_state": "in_progress",
              "include_all": True,
            }
          }

          status, body = api_request("POST", create_url, create_payload)
          print(f"Create test run HTTP status: {status}")
          if status < 200 or status >= 300:
            print("Failed to create BrowserStack test run. Response:")
            print(body)
            sys.exit(0)

          parsed = json.loads(body)
          run_obj = parsed.get("testrun") or parsed.get("test_run") or {}
          test_run_id = run_obj.get("identifier")
          if not test_run_id:
            print("Could not determine BrowserStack test run ID from response.")
            print(body)
            sys.exit(0)

          print(f"Created BrowserStack test run: {test_run_id}")

          def normalize(name: str) -> str:
            name = (name or "").strip().lower()
            name = re.sub(r"^\[[^\]]+\]\s*›\s*", "", name)
            if "›" in name:
              name = name.split("›")[-1].strip()
            name = re.sub(r"\s+", " ", name)
            return name

          case_lookup = {}
          page = 1
          while True:
            tc_url = (
              f"https://test-management.browserstack.com/api/v2/projects/{project_id}/"
              f"test-runs/{test_run_id}/test-cases?minify=true&p={page}"
            )
            tc_status, tc_body = api_request("GET", tc_url)
            if tc_status < 200 or tc_status >= 300:
              print(f"Unable to fetch test cases for run {test_run_id}. HTTP {tc_status}")
              print(tc_body)
              break

            tc_json = json.loads(tc_body)
            test_cases = tc_json.get("test_cases", [])
            for tc in test_cases:
              name_key = normalize(tc.get("name", ""))
              identifier = tc.get("identifier")
              if name_key and identifier and name_key not in case_lookup:
                case_lookup[name_key] = identifier

            info = tc_json.get("info") or {}
            if not info.get("next"):
              break
            page = info["next"]

          if not case_lookup:
            print("No test cases found in the BrowserStack run; skipping result upload.")
            sys.exit(0)

          print(f"Loaded {len(case_lookup)} BrowserStack test case names for matching.")

          try:
            root = ET.parse(junit_path).getroot()
          except Exception as exc:
            print(f"Failed to parse JUnit XML: {exc}")
            sys.exit(0)

          uploaded = 0
          unmatched = 0
          for testcase in root.findall(".//testcase"):
            raw_name = testcase.get("name", "")
            norm_name = normalize(raw_name)

            if testcase.find("failure") is not None or testcase.find("error") is not None:
              result_status = "Failed"
            elif testcase.find("skipped") is not None:
              result_status = "Skipped"
            else:
              result_status = "Passed"

            tc_id = case_lookup.get(norm_name)
            if not tc_id:
              unmatched += 1
              print(f"No BrowserStack case match for JUnit test: {raw_name}")
              continue

            result_url = (
              f"https://test-management.browserstack.com/api/v2/projects/{project_id}/"
              f"test-runs/{test_run_id}/results"
            )
            result_payload = {
              "test_result": {
                "status": result_status,
                "description": "Uploaded from GitHub Actions Playwright JUnit report",
              },
              "test_case_id": tc_id,
            }

            rs, rb = api_request("POST", result_url, result_payload)
            if 200 <= rs < 300:
              uploaded += 1
            else:
              print(f"Failed to upload result for {raw_name} (case {tc_id}). HTTP {rs}")
              print(rb)

          print(f"BrowserStack result upload complete: uploaded={uploaded}, unmatched={unmatched}")
          PY
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_PROJECT_ID: ${{ secrets.BROWSERSTACK_PROJECT_ID }}

      - name: Test summary
        if: always()
        run: |
          echo "## Playwright E2E Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run-e2e.outcome }}" = "success" ]; then
            echo "✅ All Playwright E2E tests passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some Playwright E2E tests failed. Download the **playwright-report** artifact for the HTML report and **playwright-test-results** for screenshots/videos/traces." >> $GITHUB_STEP_SUMMARY
          fi
